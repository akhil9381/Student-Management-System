<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    document.addEventListener('DOMContentLoaded',async function(){
      const p=new URLSearchParams(window.location.search)
      const id=p.get('id');
      const d=await fetch(`http://localhost:3000/students/${id}`)
      const student=await d.json();
      var x=document.getElementById('card-body')
      x.innerHTML=`<h5 class="card-title">${student.name}</h5><p class="card-text mb-0">Branch: ${student.branch}</p><p class="card-text mb-0">Roll No: ${student.rollno}</p><p class="card-text mb-0">CGPA: ${student.cgpa}</p>`
    })
    function backfunc(){
      event.preventDefault();
      window.location.href='viewstudent.html'
    }
  </script>
</head>

<body class="m-0 border-0 text-center bg-white ">
  <header>
    <div class="heading bg-primary p-1 text-white">
      <img class="align-middle rounded-circle" src="logo.png" alt="" height="70px">
      <h1 class="fw-bold p-3 d-inline-block align-middle">Student Management System </h1>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark p-0" style="background-color: rgb(0 , 0, 36);">
      <div class="container-fluid">
        <a href="dashboard.html" class="navbar-brand">
          <img src="logo.png" alt="" class="rounded-circle" height="30px">
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
          aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="mainNavbar">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a href="dashboard.html" class="nav-link fs-6">Dashboard</a>
            </li>
            <li class="nav-item">
              <a href="add-student.html" class="nav-link fs-6">Add Student</a>
            </li>
            <li class="nav-item">
              <a href="viewstudent.html" class="nav-link fs-6">View Student</a>
            </li>
            <li class="nav-item">
              <a href="contactus.html" class="nav-link fs-6">Contact US</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link fs-6" data-bs-toggle="modal" data-bs-target="#logoutmodal">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main class="d-flex w-100 flex-column justify-content-center align-items-center">
    <div class="card mt-5 rounded-5" style="width: 20rem;">
        <img class="mt-3 align-self-center" width="300" height="300" src="https://i.pinimg.com/736x/94/c6/25/94c62511d312b8612aa0ab92318966f2.jpg" alt="">
        <div class="card-body" id="card-body">
        </div>
    </div>
    <button class="mt-4 btn btn-dark" onclick="backfunc()">Back</button>
  </main>
  <div class="modal fade" id="logoutmodal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <button class="btn-close" data-bs-dismiss="modal">
          </button>
        </div>
        <div class="modal-body">
          <p class="text-start display-6">Do you want to logout?</p>
        </div>
        <div class="modal-footer">
          <a href="logout.html" class="btn btn-danger">Yes</a>
          <button class="btn btn-success" data-bs-dismiss="modal">No</button>
        </div>
      </div>
    </div>
  </div>
