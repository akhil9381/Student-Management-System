<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
      function loginValidation(){
        event.preventDefault();
        var email=document.getElementById('emailaddress').value;
        var pass=document.getElementById('password').value
        const colleges=JSON.parse(localStorage.getItem('colleges'))||[]
        if(colleges){
          for(var college of colleges){
            if(college.email===email && college.pass===pass){
              sessionStorage.setItem('logged',college.uid)
              let main=document.getElementById('maincont')
              let success=document.createElement('p')
              success.innerText='Login Successful'
              success.style='color:#07A902; border-width:1px;border-style:solid;border-color:lightgreen; padding:10px; font-weight:bold; background-color:#C0EBBE; border-radius:5px'
              main.prepend(success)
              event.target.reset()
              setTimeout(()=>{
              window.location.href="dashboard.html"},1500)
              return
            }
          }
        }
        let main=document.getElementById('maincont')
        let success=document.createElement('p')
        success.innerText='Email or Password is wrong'
        success.style='color:red; border-width:1px;border-style:solid;border-color:rgb(255, 105, 105); padding:10px; font-weight:bold; background-color:#ECDBDB;border-radius:5px'
        main.prepend(success)
        event.target.reset()
      }
    </script>
  </head>

    <!-- Main container manages perfect viewport-relative horizontal and vertical centering -->
<main class="d-flex justify-content-center align-items-center h-100" style="background-color: #f8f9fa;">
  
  <!-- This wrapper holds everything together and handles the vertical stacking -->
  <div class="d-flex flex-column w-100" style="max-width: 400px; padding: 20px;" id="maincont">
    
    <!-- Login Form -->
    <form onsubmit="loginValidation()" class="d-flex flex-column border border-1 p-4 border-black rounded-3">
      <h1 class="mb-5 text-center">Login</h1>
      
      <div class="mb-3 text-start">
        <label for="emailaddress" class="form-label fs-6">Email</label>
        <input type="email" name="email" class="form-control border border-2 border-info" id="emailaddress" required placeholder="Enter your email" />
      </div>
      
      <div class="mb-4 text-start">
        <label for="password" class="form-label fs-6">Password</label>
        <input type="password" name="password" id="password" class="form-control border border-2 border-info" required pattern=".{8,16}" placeholder="Enter your password" />
      </div>
      
      <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
    </form>

    <!-- Registration Link Section (Perfect alignment retained) -->
    <div class="text-center border-top pt-3 mt-2">
      <p class="mb-0 text-muted">
        Don't have an account? <a href="collegeregister.html" class="text-decoration-none">Click here to register</a>
      </p>
    </div>

  </div>
</main>
