<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <body>
    <header>
      <div>
        <nav>
          <a href="index.html">Home</a> &nbsp;
          <a href="login.html">Login</a> &nbsp;
          <a href="register.html">Register</a>
        </nav>
      </div>
    </header>
    <hr />
    <main>
      <h1>Login</h1>
      <br />
      <form action="dashboard.html">
        Email:
        <input
          type="email"
          name=""
          id=""
          required
          placeholder="email"
        /><br /><br />
        Password:
        <input
          type="password"
          name=""
          id=""
          required
          pattern=".{8,16}"
          placeholder="password"
        /><br /><br />
        <input type="submit" value="Login" />
      </form>
    </main>
  </body>
</html>
