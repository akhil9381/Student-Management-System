<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    let uid=sessionStorage.getItem('logged')
    let colleges=JSON.parse(localStorage.getItem('colleges'))
    let college=null
    let sid=null
    for(let x of colleges){
        if(x.uid===uid){
            college=x
            break
        }
    }
    function viewStudent(){
    var tbody=document.getElementsByTagName('tbody')[0]
    tbody.innerHTML=''
    for(var student of college.students){
        var tr=document.createElement('tr')
        tr.innerHTML=`<td>${student.id}</td><td>${student.name}</td><td>${student.branch}</td><td>${student.cgpa}</td><td><button onclick="profile(${student.id})" class="text-decoration-none m-2 btn btn-info">View</button><button class="text-decoration-none m-2 btn btn-success edit-btn" onclick="editStudent(${student.id})">Edit</button><button class="text-decoration-none m-2 btn btn-danger delete-btn" data-bs-toggle="modal" data-bs-target="#deletemodal" onclick="setsid(${student.id})">Delete</button></td>`
        tbody.appendChild(tr)
    }
    }
    function setsid(id){
      sid=id
    }
    function deleteStudent(){
      var students=[]
        for(var s of college.students){
          if(s.id!=sid)
            students.push(s)
        }
        college.students=students
        var cid=-1
        for(var i=0;i<colleges.length;i++){
          if(colleges[i].uid==uid){
            cid=i;
            break
          }
        }
        colleges[cid]=college
        localStorage.setItem('colleges',JSON.stringify(colleges))
        viewStudent();
        let main=document.getElementById('maincont')
        let success=document.createElement('p')
        success.innerText='Student Deleted'
        success.style='color:red; border-width:1px;border-style:solid;border-color:rgb(255, 105, 105); padding:10px; font-weight:bold; background-color:#ECDBDB;border-radius:5px'
        main.prepend(success)
        success.style.display='block';
        setTimeout(() => {
           success.style.display='none'
        }, 1500);
    }
    function editStudent(sid){
      var student=null;
      for(var s of college.students){
        if(s.id==sid){
          student=s;
          break;
        }
      }
      sessionStorage.setItem('editStudent',JSON.stringify(student))
      window.location.href='edit-student.html'
    }
    function profile(sid){
      var student=null;
      for(var s of college.students){
        if(s.id==sid){
          student=s;
          break;
        }
      }
      sessionStorage.setItem('viewStudent',JSON.stringify(student))
      window.location.href='profile.html'
    }
    document.addEventListener('DOMContentLoaded',viewStudent)
  </script>
</head>

<body class="m-0 border-0 text-center bg-white ">

    <div class="heading bg-primary p-1 text-white">

    </div>

      <div class="container-fluid">
        <a href="dashboard.html" class="navbar-brand">
          <img src="logo.png" alt="" class="rounded-circle" height="30px">
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
          aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="mainNavbar">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a href="dashboard.html" class="nav-link fs-6">Dashboard</a>
            </li>
            <li class="nav-item">
              <a href="add-student.html" class="nav-link fs-6">Add Student</a>
            </li>
            <li class="nav-item">
              <a href="viewstudent.html" class="nav-link fs-6">View Student</a>
            </li>
            <li class="nav-item">
              <a href="contactus.html" class="nav-link fs-6">Contact US</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link fs-6" data-bs-toggle="modal" data-bs-target="#logoutmodal">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main class="d-flex flex-column align-items-center justify-content-center h-100 mt-5">
    <div class="d-flex flex-column w-100" style="max-width: 800px; padding: 20px;" id="maincont">
        <h1 class="mb-5 text-center">Student Details</h1>
        <div class="table-responsive">
          <table class="table table-hover table-bordered border-black">
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Student Name</th>
                    <th>Branch</th>
                    <th>CGPA</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
    </div>
  </main>
  <div class="modal fade" id="logoutmodal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <button class="btn-close" data-bs-dismiss="modal">
          </button>
        </div>
        <div class="modal-body">
          <p class="text-start display-6">Do you want to logout?</p>
        </div>
        <div class="modal-footer">
          <a href="logout.html" class="btn btn-danger">Yes</a>
          <button class="btn btn-success" data-bs-dismiss="modal">No</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal fade" id="deletemodal">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-start display-6">Do you want to delete?</div>
            <div class="modal-footer">
              <button class="btn btn-danger" data-bs-dismiss="modal" onclick="deleteStudent()">Yes</button>
              <button class="btn btn-success" data-bs-dismiss="modal">No</button>
            </div>
          </div>
        </div>
      </div>
