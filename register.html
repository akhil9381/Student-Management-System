<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  </head>
  <body class="m-0 border-0 text-center bg-white ">
    <header>
      <div>
        <div class="heading bg-primary p-1 text-white">
            <img class="align-middle rounded-circle" src="logo.png" alt="" height="70px">
          <h1 class="fw-bold p-3 d-inline-block align-middle">Student Management System </h1>
        </div>
        <nav class="navbar navbar-expand-lg p-1 navbar-dark" style="background-color: rgb(0 , 0, 36);">
          <div class="container-fluid">
            <ul class="navbar-nav mx-auto gap-5">
              <li class="nav-item">
             <a href="index.html" class="nav-link mx-2 fs-5">Home</a>
              </li>
              <li class="nav-item">
                          <a href="login.html" class="nav-link mx-2 fs-5">Login</a>
              </li>
              <li class="nav-item">
                <a href="register.html" class="nav-link mx-2 fs-5">Register</a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>
    <main class="d-flex justify-content-center align-items-center h-100" style="background-color: #f8f9fa;">
      <div class="d-flex flex-column w-100" style="max-width: 400px; padding: 20px;">
          <form action="login.html" class="d-flex flex-column border border-1 p-4 border-black rounded-3">
        <h1 class="text-center mb-3">Register</h1>
        <div class="mb-3 text-start">
          <label for="username" class="form-label fs-6">Username</label>
        <input
          type="text"
          name=""
          id="username"
          required
          class="form-control border border-2 border-info"
          pattern=".{4,}"
          placeholder="username"
          title="Username must be 4 characters long"
        />
        </div>
        <div class="mb-3 text-start">
          <label for="" class="form-label fs-6">Email</label>
          <input
            type="email"
            name=""
            class="form-control border border-2 border-info"
            id=""
            required
            placeholder="email"
          />
        </div>
        <div class="mb-3 text-start">
          <label for="" class="fs-6 form-label">Password</label>
          <input
            type="password"
            name=""
            id=""
            class="form-control border border-2 border-info"
            required
            pattern=".{8,16}"
            placeholder="password"
            title="Password must be 8-16 characters long"
          />
        </div>
        <div class="mb-4 text-start">
          <label for="" class="fs-6 form-label">Confirm Password</label>
          <input
            type="password"
            name=""
            id=""
            class="form-control border border-2 border-info"
            required
            pattern=".{8,16}"
            placeholder="confirm password"
            title="Password must be 8-16 characters long"
          />
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Submit</button>
      </form>
      <div class="text-center border-top pt-2 mt-3">
        <p class="mb-0 text-muted">
          Already have an account?
                <a href="login.html" class="text-decoration-none">Click here to login</a>
        </p>
      </div>
    </div>
    </main>
  </body>
</html>
