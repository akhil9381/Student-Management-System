<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    document.addEventListener('DOMContentLoaded',async function(){
      const d=await fetch('http://localhost:3000/students')
      const students=await d.json();
      var total=document.getElementById('totalcount')
      total.innerText=students.length
      var present=document.getElementById('presentcount')
      present.innerText=students.length
      var absent=document.getElementById('absentcount')
      absent.innerText=0
      var placed=document.getElementById('placedcount')
      placed.innerText=students.length
    })
  </script>
</head>

<body class="m-0 border-0 text-center bg-white ">
  <header>
    <div class="heading bg-primary p-1 text-white">
      <img class="align-middle rounded-circle" src="logo.png" alt="" height="70px">
      <h1 class="fw-bold p-3 d-inline-block align-middle">Student Management System </h1>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark p-0" style="background-color: rgb(0 , 0, 36);">
      <div class="container-fluid">
        <a href="dashboard.html" class="navbar-brand">
          <img src="logo.png" alt="" class="rounded-circle" height="30px">
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
          aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="mainNavbar">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a href="dashboard.html" class="nav-link fs-6">Dashboard</a>
            </li>
            <li class="nav-item">
              <a href="add-student.html" class="nav-link fs-6">Add Student</a>
            </li>
            <li class="nav-item">
              <a href="viewstudent.html" class="nav-link fs-6">View Student</a>
            </li>
            <li class="nav-item">
              <a href="contactus.html" class="nav-link fs-6">Contact US</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link fs-6" data-bs-toggle="modal" data-bs-target="#logoutmodal">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main class="d-flex flex-column align-items-center justify-content-center h-100 mt-5">
    <h1 class="fw-bold text-center">Dashboard</h1>
    <div class="container mt-5">
      <div class="row g-5">
        <div class="col-sm-6 col-md-3">
          <div class="info1 bg-primary text-white p-3 rounded-2 text-start position-relative">
            <div>
              <p class="fs-4 fw-bold">Total Students</p>
              <p class="fs-5" id="totalcount"></p>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="currentColor"
              class="bi bi-people-fill position-absolute bottom-0 end-0 m-3" viewBox="0 0 16 16">
              <path
                d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5.784 6A2.24 2.24 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.3 6.3 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1zM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5" />
            </svg>
          </div>
        </div>
        <div class="col-sm-6 col-md-3">
          <div class="info2 bg-success text-white p-3 rounded-2 text-start position-relative">
            <div>
              <p class="fs-4 fw-bold">Present</p>
              <p class="fs-5" id="presentcount"></p>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="currentColor"
              class="bi bi-people-fill position-absolute bottom-0 end-0 m-3" viewBox="0 0 16 16">
              <path
                d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5.784 6A2.24 2.24 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.3 6.3 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1zM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5" />
            </svg>
          </div>
        </div>
        <div class=" col-sm-6 col-md-3">
          <div class="info3 bg-danger text-white p-3 rounded-2 text-start position-relative">
            <div>
              <p class="fs-4 fw-bold">Absent</p>
              <p class="fs-5" id="absentcount"></p>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="currentColor"
              class="bi bi-people-fill position-absolute bottom-0 end-0 m-3" viewBox="0 0 16 16">
              <path
                d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5.784 6A2.24 2.24 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.3 6.3 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1zM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5" />
            </svg>
          </div>
        </div>
        <div class="col-sm-6 col-md-3">
          <div class="info4 bg-info text-white p-3 rounded-2 text-start position-relative">
            <div>
              <p class="fs-4 fw-bold">Placed Students</p>
              <p class="fs-5" id="placedcount"></p>
            </div><svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="currentColor"
              class="bi bi-people-fill position-absolute bottom-0 end-0 m-3" viewBox="0 0 16 16">
              <path
                d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5.784 6A2.24 2.24 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.3 6.3 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1zM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5" />
            </svg>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div class="modal fade" id="logoutmodal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <button class="btn-close" data-bs-dismiss="modal">
          </button>
        </div>
        <div class="modal-body">
          <p class="text-start display-6">Do you want to logout?</p>
        </div>
        <div class="modal-footer">
          <a href="logout.html" class="btn btn-danger">Yes</a>
          <button class="btn btn-success" data-bs-dismiss="modal">No</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal" id="deletemodal">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-start display-6">Do you want to delete?</div>
            <div class="modal-footer">
              <a href="dashboard.html" class="btn btn-danger">Yes</a>
              <button class="btn btn-success" data-bs-dismiss="modal">No</button>
            </div>
          </div>
        </div>
      </div>
      <footer class="border-top border-black mt-4">
