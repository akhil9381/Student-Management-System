<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .blink-colourful {
      animation: colorfulBlinker 1s infinite linear;
      }

      @keyframes colorfulBlinker {
      0% { opacity: 1; color: #dc3545; }      /* Bootstrap Danger (Red) */
      20% { opacity: 1; color: aqua;}                     /* Fades out */
      40% { opacity: 1; color: #0d6efd; }      /* Bootstrap Primary (Blue) */
      60% { opacity: 1; color: black;}                     /* Fades out */
      80% { opacity: 1; color: #198754; }      /* Bootstrap Success (Green) */
      100% { opacity: 1; color: #dc3545; }    /* Loops back to Red */
      }
    </style>
  </head>
  <body class="m-0 border-0 text-center bg-white ">
    <header>
      <div class="heading bg-primary p-1 text-white">
            <img class="align-middle rounded-circle" src="logo.png" alt="" height="70px">
          <h1 class="fw-bold p-3 d-inline-block align-middle">Student Management System </h1>
        </div>
      <nav class="navbar navbar-expand-lg p-1 navbar-dark" style="background-color: rgb(0 , 0, 36);">
          <div class="container-fluid">
            <ul class="navbar-nav mx-auto gap-5">
              <li class="nav-item">
                  <a href="dashboard.html" class="nav-link mx-2 fs-5">Dashboard</a>
              </li>
              <li class="nav-item">
                  <a href="add-student.html" class="nav-link mx-2 fs-5">Add Student</a>
              </li>
              <li class="nav-item">
                  <a href="view-students.html" class="nav-link mx-2 fs-5">View Students</a>
              </li>
              <li class="nav-item">
                  <a href="#" class="nav-link mx-2 fs-5" data-bs-toggle="modal" data-bs-target="#logoutmodal">Logout</a>
              </li>
            </ul>
          </div>
        </nav>
    </header>
    <main class="d-flex flex-column align-items-center justify-content-center h-100 mt-5">
      <h1 class="text-center m-5 fw-bold fs-1">Welcome to Dashboard</h1>
        <a href="add-student.html" class="text-decoration-none m-3 blink-colourful fs-5">Click here to add Student</a>
        <a href="view-students.html" class="text-decoration-none m-3 blink-colourful fs-5">Click here to View Students</a>
    </main>
    <div class="modal fade" id="logoutmodal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <button class="btn-close" data-bs-dismiss="modal">
            </button>
          </div>
          <div class="modal-body">
            <p class="text-start display-6">Do you want to logout?</p>
          </div>
          <div class="modal-footer">
            <a href="logout.html" class="btn btn-danger">Yes</a>
            <button class="btn btn-success" data-bs-dismiss="modal">No</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
