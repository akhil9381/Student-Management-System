<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Student</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <div class="heading">
        <img src="logo.png" alt="" height="70px">
        <h1>Student Management System </h1>
      </div>
      <nav>
        <a href="dashboard.html">Dashboard</a> &nbsp;
        <a href="add-student.html">Add Student</a> &nbsp;
        <a href="view-students.html">View Students</a> &nbsp;
        <a href="logout.html">Logout</a>
      </nav>
    </header>
    <main>
      <h1>Add Student</h1>
      <form action="view-students.html">
        Student ID: <input type="text" required pattern="[0-9]{4,}"/>
        Student Name: <input type="text" required pattern="[A-Za-z]{1,}"/>
        Branch:
        <br>
        <select name="" id="">
          <option value="CSE">CSE</option>
          <option value="CSD">CSD</option>
          <option value="CSM">CSM</option>
          <option value="CSC">CSC</option>
          <option value="CSB">CSB</option>
          <option value="IT">IT</option>
          <option value="ECE">ECE</option>
          <option value="EEE">EEE</option>
          <option value="EIE">EIE</option>
          <option value="CIVIL">CIVIL</option>
          <option value="MECH">MECH</option></select
        ><br>
        CGPA: <input type="number" name="" id="" step="0.01" placeholder="5.00" min="5"/>
        <input type="submit" value="Submit" />
      </form>
    </main>
  </body>
</html>
