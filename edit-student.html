<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>
  <body class="m-0 border-0 text-center bg-white ">
    <header>
      <div class="heading bg-primary p-1 text-white">
            <img class="align-middle rounded-circle" src="logo.png" alt="" height="70px">
          <h1 class="fw-bold p-3 d-inline-block align-middle">Student Management System </h1>
        </div>
      <nav class="navbar navbar-expand-lg p-1 navbar-dark" style="background-color: rgb(0 , 0, 36);">
          <div class="container-fluid">
            <ul class="navbar-nav mx-auto gap-5">
              <li class="nav-item">
                  <a href="dashboard.html" class="nav-link mx-2 fs-5">Dashboard</a>
              </li>
              <li class="nav-item">
                  <a href="add-student.html" class="nav-link mx-2 fs-5">Add Student</a>
              </li>
              <li class="nav-item">
                  <a href="view-students.html" class="nav-link mx-2 fs-5">View Students</a>
              </li>
              <li class="nav-item">
                  <a href="#" class="nav-link mx-2 fs-5" data-bs-toggle="modal" data-bs-target="#logoutmodal">Logout</a>
              </li>
            </ul>
          </div>
        </nav>
    </header>
    <main class="d-flex justify-content-center align-items-center h-100" style="background-color: #f8f9fa;">
      <div class="d-flex flex-column w-100" style="max-width: 500px; padding: 20px;">
        <form action="view-students.html" class="d-flex flex-column border border-1 p-4 border-black rounded-3">
          <h1 class="mb-3 text-center">Edit Student Details</h1>
          <div class="mb-3 text-start">
           <label for="" class="fs-6 form-label">Student ID</label>
          <input
            type="text"
            value="6267"
            class="form-control border border-2 border-info"
            pattern="{0-9}{4,}"
            required
          />
          </div>
           <div class="mb-3 text-start">
           <label for="" class="fs-6 form-label">Student Name</label>
           <input type="text" value="Akhil" class="form-control border border-2 border-info" required pattern="[A-Za-z]{1,}"/>
          </div>
           <div class="mb-3 text-start">
           <label for="" class="fs-6 form-label">Branch</label>
           <select name="" id="" class="form-select border border-2 border-info">
            <option value="CSE">CSE</option>
            <option value="CSD">CSD</option>
            <option value="CSM">CSM</option>
            <option value="CSC">CSC</option>
            <option value="CSB">CSB</option>
            <option value="IT">IT</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
            <option value="EIE">EIE</option>
            <option value="CIVIL">CIVIL</option>
            <option value="MECH">MECH</option>
            </select>
          </div>
          <div class="mb-4 text-start">
           <label for="" class="fs-6 form-label">CGPA</label>
           <input type="number" name="" id="" value="9" step="0.01" class="form-control border border-2 border-info"/>
          </div>
          <button type="submit" class="mb-4 btn btn-primary">Submit</button>
          <a href="view-students.html" class="btn btn-danger">Cancel</a>
        </form>
      </div>
    </main>
    <div class="modal fade" id="logoutmodal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <button class="btn-close" data-bs-dismiss="modal">
            </button>
          </div>
          <div class="modal-body">
            <p class="text-start display-6">Do you want to logout?</p>
          </div>
          <div class="modal-footer">
            <a href="logout.html" class="btn btn-danger">Yes</a>
            <button class="btn btn-success" data-bs-dismiss="modal">No</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
